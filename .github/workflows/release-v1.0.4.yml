name: Release VisualTeX 1.0.4

on:
  workflow_dispatch:
  push:
    tags:
      - "v1.0.4"

permissions:
  contents: write

concurrency:
  group: visualtex-release-1.0.4
  cancel-in-progress: false

env:
  VISUALTEX_VERSION: 1.0.4

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            label: macOS Apple Silicon
            rust_target: aarch64-apple-darwin
            build_args: --target aarch64-apple-darwin --bundles dmg
            artifact_name: VisualTeX-1.0.4-macOS-Apple-Silicon
            artifact_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - platform: windows-latest
            label: Windows x64
            rust_target: ""
            build_args: --bundles nsis
            artifact_name: VisualTeX-1.0.4-Windows-x64
            artifact_paths: |
              src-tauri/target/release/bundle/nsis/*.exe
          - platform: ubuntu-22.04
            label: Linux x64
            rust_target: ""
            build_args: --bundles deb,appimage
            artifact_name: VisualTeX-1.0.4-Linux-x64
            artifact_paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Apple Silicon target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Verify release version
        shell: bash
        run: |
          node -e "const p=require('./package.json'); const t=require('./src-tauri/tauri.conf.json'); if(p.version!==process.env.VISUALTEX_VERSION||t.version!==process.env.VISUALTEX_VERSION){throw new Error('package.json and tauri.conf.json version mismatch')}"
          grep -q "^version = \"${VISUALTEX_VERSION}\"$" src-tauri/Cargo.toml

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Test LaTeX code formats
        run: npm run test:latex-format

      - name: Smoke-test OCR worker lifecycle
        run: python scripts/smoke_ocr_worker.py

      - name: Run editor regression test when Chrome is available
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [[ -x "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" ]]; then
            npm run test:editor
          else
            echo "Google Chrome is not installed on this runner; skipping the browser-only regression test."
          fi

      - name: Detect complete Apple signing credentials
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" && -n "$APPLE_CERTIFICATE_PASSWORD" && -n "$APPLE_ID" && -n "$APPLE_PASSWORD" && -n "$APPLE_TEAM_ID" && -n "$KEYCHAIN_PASSWORD" ]]; then
            echo "MAC_SIGNING_READY=true" >> "$GITHUB_ENV"
          else
            echo "MAC_SIGNING_READY=false" >> "$GITHUB_ENV"
            echo "Apple Developer ID credentials are incomplete; the fallback ad-hoc signature will be used."
          fi

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && env.MAC_SIGNING_READY == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/visualtex-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/visualtex-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          CERT_ID="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          if [[ -z "$CERT_ID" ]]; then
            echo "Developer ID Application identity was not found after certificate import." >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Build non-macOS installer packages
        if: runner.os != 'macOS'
        run: npm run tauri -- build ${{ matrix.build_args }}

      - name: Build signed and notarized macOS installer
        if: runner.os == 'macOS' && env.MAC_SIGNING_READY == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri -- build ${{ matrix.build_args }}

      - name: Build fallback ad-hoc signed macOS installer
        if: runner.os == 'macOS' && env.MAC_SIGNING_READY != 'true'
        run: npm run tauri -- build ${{ matrix.build_args }}

      - name: Verify macOS DMG, app bundle, signature, and notarization status
        if: runner.os == 'macOS'
        shell: bash
        env:
          EXPECTED_VERSION: 1.0.4
        run: |
          dmg="$(find src-tauri/target -type f -path '*/release/bundle/dmg/*.dmg' -print -quit)"
          if [[ "$MAC_SIGNING_READY" == "true" ]]; then
            REQUIRE_NOTARIZATION=1 bash scripts/verify_macos_dmg.sh "$dmg"
          else
            bash scripts/verify_macos_dmg.sh "$dmg"
          fi

      - name: Verify Windows NSIS installer structure
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not produced" }
          if ($installer.Length -lt 1MB) { throw "NSIS installer is unexpectedly small" }
          & 7z t $installer.FullName
          if ($LASTEXITCODE -ne 0) { throw "NSIS installer archive verification failed" }
          Get-FileHash $installer.FullName -Algorithm SHA256 | Format-List

      - name: Verify Linux DEB and AppImage structure
        if: runner.os == 'Linux'
        shell: bash
        run: |
          deb="$(find src-tauri/target/release/bundle/deb -type f -name '*.deb' -print -quit)"
          appimage="$(find src-tauri/target/release/bundle/appimage -type f -name '*.AppImage' -print -quit)"
          test -s "$deb"
          test -s "$appimage"
          dpkg-deb --info "$deb" >/dev/null
          dpkg-deb --contents "$deb" >/dev/null
          file "$appimage" | grep -q 'ELF'
          chmod +x "$appimage"
          extract_dir="$(mktemp -d)"
          (
            cd "$extract_dir"
            "$GITHUB_WORKSPACE/$appimage" --appimage-extract >/dev/null
            test -x squashfs-root/AppRun
          )
          rm -rf "$extract_dir"
          sha256sum "$deb" "$appimage"

      - name: Upload verified installer packages
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download all verified installers
        uses: actions/download-artifact@v8
        with:
          pattern: VisualTeX-1.0.4-*
          path: release-assets
          merge-multiple: true

      - name: Verify downloaded artifact set and write checksums
        shell: bash
        run: |
          test "$(find release-assets -type f -name '*.dmg' | wc -l)" -eq 1
          test "$(find release-assets -type f -name '*.exe' | wc -l)" -eq 1
          test "$(find release-assets -type f -name '*.deb' | wc -l)" -eq 1
          test "$(find release-assets -type f -name '*.AppImage' | wc -l)" -eq 1
          (
            cd release-assets
            find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS.txt
            sha256sum -c SHA256SUMS.txt
          )

      - name: Publish VisualTeX v1.0.4
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v1.0.4
          name: VisualTeX v1.0.4
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body: |
            VisualTeX 1.0.4 focuses on reliable formula editing, command candidates, custom matrices, onboarding, and installer integrity.

            Highlights:
            - Fixed command candidates that could not be committed or dismissed with Enter.
            - Restyled command recommendations with readable text and a subtle light-blue selection border.
            - Removed candidate-list flicker during keyboard navigation by keeping the existing list DOM stable.
            - Fixed structured-operator deletion so integrals, sums, and similar operators are not skipped.
            - Added adaptive compact formula rows for simple expressions and automatic expansion for tall structures.
            - Added custom matrices with parentheses, brackets, or vertical bars from 1×1 through 10×10.
            - Expanded onboarding with update checks and first-use OCR model guidance.
            - Added release-time package verification and SHA-256 checksums for every installer.

            Downloads:
            - macOS Apple Silicon: DMG
            - Windows x64: NSIS installer
            - Linux x64: AppImage and Debian package

            macOS packaging note:
            - Every DMG is verified as a disk image, mounted, and checked for a complete nested app signature and CodeResources file before publishing.
            - When Apple Developer ID and notarization secrets are configured, the release workflow requires Gatekeeper assessment and a valid stapled notarization ticket.
            - Without those Apple credentials, the fallback package is ad-hoc signed and macOS may still require approval in System Settings → Privacy & Security.

            Windows packaging note:
            - The NSIS archive is tested before publishing. An unsigned build may still trigger Microsoft SmartScreen.
          files: |
            release-assets/*.dmg
            release-assets/*.exe
            release-assets/*.deb
            release-assets/*.AppImage
            release-assets/SHA256SUMS.txt
