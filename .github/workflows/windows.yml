name: Windows application

on:
  push:
    paths:
      - "apps/windows/**"
      - "package.json"
      - "tools/**"
      - ".github/workflows/windows.yml"
  pull_request:
    paths:
      - "apps/windows/**"
      - "package.json"
      - "tools/**"
      - ".github/workflows/windows.yml"

jobs:
  build-and-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/windows/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npm run build:desktop
      - run: npm run test:platform-onboarding
      - run: npm run test:windows-office-architecture
      - run: npm run verify:office-manifest
      - run: npm run build:office:windows-ole
      - run: python -m pip install "Pillow>=10.4,<12" "numpy>=1.26,<3"
      - run: python -m unittest ocr.tests.test_worker_preprocess
      - run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/build_windows_ole_bridge.ps1
      - name: Prepare Tauri test-only VSTO resources
        shell: pwsh
        run: |
          $resourceDir = "src-tauri/resources/windows-office"
          New-Item -ItemType Directory -Force $resourceDir | Out-Null
          foreach ($platform in @("x64", "x86")) {
            $msiName = "VisualTeX-WindowsOffice-VSTO-$platform.msi"
            New-Item -ItemType File -Force (Join-Path $resourceDir $msiName) | Out-Null
            $metadata = @{
              fileName = $msiName
              sha256 = ""
              size = 0
              testOnly = $true
            } | ConvertTo-Json -Compress
            Set-Content -NoNewline -Path (Join-Path $resourceDir "VisualTeX-WindowsOffice-VSTO-$platform.sha256.json") -Value $metadata
          }
      # The Windows Tauri test executable is known to exit in the loader before
      # the Rust harness starts (STATUS_ENTRYPOINT_NOT_FOUND). Keep both source
      # checking and full test-binary linking as explicit gates without claiming
      # that the Rust unit tests ran on this runner.
      - name: Check Windows Rust tests
        run: cargo check --manifest-path src-tauri/Cargo.toml --tests
      - name: Compile Windows Rust test binary
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --no-run
