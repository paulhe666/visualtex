name: Release VisualTeX 0.1.1

on:
  workflow_dispatch:
  push:
    tags:
      - "v0.1.1"

permissions:
  contents: write

concurrency:
  group: visualtex-release-0.1.1
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            label: macOS Apple Silicon
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - platform: windows-latest
            label: Windows x64
            args: --bundles nsis
          - platform: ubuntu-22.04
            label: Linux x64
            args: --bundles deb,appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Apple Silicon target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Verify version 0.1.1
        shell: bash
        run: |
          node -e "const p=require('./package.json'); const t=require('./src-tauri/tauri.conf.json'); if(p.version!=='0.1.1'||t.version!=='0.1.1'){throw new Error('package.json and tauri.conf.json must both be 0.1.1')}"
          grep -q '^version = "0.1.1"$' src-tauri/Cargo.toml

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and attach release installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: VisualTeX v__VERSION__
          releaseBody: |
            VisualTeX 0.1.1 is a Windows OCR compatibility hotfix.

            Fixes:
            - Detects side-by-side Python 3.9–3.13 installations through the Windows Python launcher, even when Python 3.14 is the default.
            - Forces the OCR worker protocol to UTF-8 and ASCII-safe JSON.
            - Prevents GBK/CP936 or native dependency logs from breaking OCR communication.
            - Adds an NSIS pre-install check and a clear warning when the OCR Python prerequisite is missing.

            macOS Apple Silicon:
            - DMG installer

            Windows x64:
            - NSIS .exe installer with prerequisite detection

            Linux x64:
            - AppImage
            - Debian .deb package

            This release is unsigned. Windows SmartScreen and some Linux desktop environments may show a warning on first launch.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
