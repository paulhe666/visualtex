name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust-core:
    name: Rust core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check
      - name: Clippy core and bridge
        run: cargo clippy --workspace --all-targets --exclude visualtex-desktop -- -D warnings
      - name: Test core and bridge
        run: cargo test --workspace --exclude visualtex-desktop
      - name: Validate Windows TeXstudio adapter runtime
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          cargo build -p visualtex-cli
          $project = Join-Path $env:RUNNER_TEMP "VisualTeX 桥接 项目"
          $prefix = Join-Path $env:RUNNER_TEMP "VisualTeX TeXstudio adapter"
          $statusJson = Join-Path $env:RUNNER_TEMP "visualtex-bridge-status.json"
          Remove-Item -Recurse -Force $project, $prefix -ErrorAction SilentlyContinue
          Copy-Item -Recurse fixtures/templates/basic-zh $project
          $env:VISUALTEX_BIN = (Resolve-Path "target/debug/visualtex.exe").Path
          $started = $false
          try {
            & scripts/texstudio/windows/Install-VisualTeXTexstudio.ps1 -Prefix $prefix
            & scripts/texstudio/windows/Install-VisualTeXTexstudio.ps1 -Prefix $prefix
            & (Join-Path $prefix "bin/VisualTeX-BridgeStart.ps1") -ProjectRoot $project | Out-Null
            $started = $true
            . (Join-Path $prefix "bin/VisualTeX-Common.ps1")
            Invoke-VisualTeXJsonToFile `
              -Arguments @("bridge-status", $project) `
              -OutputJson $statusJson
            $status = Get-Content -Raw $statusJson | ConvertFrom-Json
            if (-not (Test-Path -LiteralPath $status.projectRoot -PathType Container)) {
              throw "Bridge status lost the Unicode project path"
            }
          }
          finally {
            if ($started) {
              & (Join-Path $prefix "bin/VisualTeX-BridgeStop.ps1") -ProjectRoot $project | Out-Null
            }
            Remove-Item -Recurse -Force $project, $prefix -ErrorAction SilentlyContinue
            Remove-Item -Force $statusJson -ErrorAction SilentlyContinue
          }

  frontend:
    name: TypeScript quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm -r typecheck
      - run: corepack pnpm -r test
      - run: corepack pnpm -r build
      - name: Validate POSIX TeXstudio adapters
        shell: bash
        run: |
          set -euo pipefail
          for script in scripts/texstudio/*.sh; do
            sh -n "$script"
          done
          prefix="$(mktemp -d)/adapter install"
          sh scripts/texstudio/install.sh --prefix "$prefix"
          sh scripts/texstudio/install.sh --prefix "$prefix"
          sh scripts/texstudio/uninstall.sh --prefix "$prefix"

  desktop-check:
    name: Tauri check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux desktop libraries
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter @visualtex/desktop build:web
      - run: cargo check -p visualtex-desktop
      - name: Parse Windows TeXstudio adapters
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem scripts/texstudio/windows/*.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error "PowerShell parse errors in $($_.FullName): $($errors -join '; ')"
            }
          }
          if ($failed) { exit 1 }
