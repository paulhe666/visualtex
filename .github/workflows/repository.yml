name: Repository structure

on:
  push:
    paths:
      - "README.md"
      - "docs/**"
      - "tools/**"
      - "package.json"
      - "apps/*/package.json"
      - ".github/workflows/repository.yml"
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "tools/**"
      - "package.json"
      - "apps/**"
      - ".github/workflows/repository.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run test:repository
