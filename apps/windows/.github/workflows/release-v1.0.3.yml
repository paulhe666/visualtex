name: Release VisualTeX 1.0.3

on:
  workflow_dispatch:
  push:
    tags:
      - "v1.0.3"

permissions:
  contents: write

concurrency:
  group: visualtex-release-1.0.3
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            label: macOS Apple Silicon
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - platform: windows-latest
            label: Windows x64
            args: --bundles nsis
          - platform: ubuntu-22.04
            label: Linux x64
            args: --bundles deb,appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Apple Silicon target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Verify version 1.0.3
        shell: bash
        run: |
          node -e "const p=require('./package.json'); const t=require('./src-tauri/tauri.conf.json'); if(p.version!=='1.0.3'||t.version!=='1.0.3'){throw new Error('package.json and tauri.conf.json must both be 1.0.3')}"
          grep -q '^version = "1.0.3"$' src-tauri/Cargo.toml

      - name: Install frontend dependencies
        run: npm ci

      - name: Smoke-test OCR worker lifecycle
        run: python scripts/smoke_ocr_worker.py

      - name: Build and attach release installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: VisualTeX v__VERSION__
          releaseBody: |
            VisualTeX 1.0.3 refines formula editing and command discovery.

            Highlights:
            - Larger formula text and caret with adaptive row height for matrices and determinants.
            - Reliable mouse and keyboard command-candidate selection.
            - Restyled command suggestions aligned with the VisualTeX desktop interface.
            - High-priority structured sum, product, limit, and integral templates.
            - Expanded calculus toolbar covering definite, indefinite, multiple, line, surface, and closed integrals.
            - Optional automatic update checks with a user-controlled startup preference.

            macOS Apple Silicon:
            - DMG installer

            Windows x64:
            - NSIS .exe installer with Python prerequisite detection

            Linux x64:
            - AppImage
            - Debian .deb package

            This release is unsigned. Windows SmartScreen and some Linux desktop environments may show a warning on first launch.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
