name: Release VisualTeX 0.1.0

on:
  workflow_dispatch:
  push:
    tags:
      - "v0.1.0"

permissions:
  contents: write

concurrency:
  group: visualtex-release-0.1.0
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows x64
            args: --bundles nsis,msi
          - platform: ubuntu-22.04
            label: Linux x64
            args: --bundles deb,appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Verify version 0.1.0
        shell: bash
        run: |
          node -e "const p=require('./package.json'); const t=require('./src-tauri/tauri.conf.json'); if(p.version!=='0.1.0'||t.version!=='0.1.0'){throw new Error('package.json and tauri.conf.json must both be 0.1.0')}"
          grep -q '^version = "0.1.0"$' src-tauri/Cargo.toml

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and attach release installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: VisualTeX v__VERSION__
          releaseBody: |
            VisualTeX 0.1.0 desktop installers.

            Windows x64:
            - NSIS .exe installer
            - MSI installer

            Linux x64:
            - AppImage
            - Debian .deb package

            This release is unsigned. Windows SmartScreen and some Linux desktop environments may show a warning on first launch.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
