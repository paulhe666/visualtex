name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "src-tauri/**"
      - "src-windows/**"
      - "office/**"
      - "ocr/**"
      - "*.html"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "vite*.config.*"
      - "tsconfig*.json"
      - ".github/workflows/build-windows-linux.yml"

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            label: macOS Apple Silicon
            rust_target: aarch64-apple-darwin
            build_args: --target aarch64-apple-darwin --bundles dmg
            artifact_name: VisualTeX-1.1.0-macOS-Apple-Silicon
            artifact_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - platform: windows-latest
            label: Windows x64
            build_args: --bundles nsis
            artifact_name: VisualTeX-1.1.0-Windows-x64
            artifact_paths: |
              src-tauri/target/release/bundle/nsis/VisualTeX_1.1.0_x64-setup.exe
          - platform: ubuntu-22.04
            label: Linux x64
            build_args: --bundles deb,appimage
            artifact_name: VisualTeX-1.1.0-Linux-x64
            artifact_paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up .NET 8
        if: runner.os == 'Windows'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Apple Silicon target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Verify version 1.1.0
        shell: bash
        run: |
          node -e "const p=require('./package.json'); const t=require('./src-tauri/tauri.conf.json'); if(p.version!=='1.1.0'||t.version!=='1.1.0'){throw new Error('package.json and tauri.conf.json must both be 1.1.0')}"
          grep -q '^version = "1.1.0"$' src-tauri/Cargo.toml

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify Windows Office architecture and manifests
        if: runner.os == 'Windows'
        run: |
          npm run test:windows-office-architecture
          npm run test:office-platform-boundaries
          npm run verify:office-manifest

      - name: Test LaTeX code formats
        run: npm run test:latex-format

      - name: Test global history manager
        run: npm run test:history

      - name: Test localized update notes
        run: npm run test:update-notes

      - name: Build frontend
        run: npm run build

      - name: Smoke-test OCR worker lifecycle
        run: python scripts/smoke_ocr_worker.py

      - name: Build Windows installer package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item "src-tauri/target/release/bundle/nsis" -Recurse -Force -ErrorAction SilentlyContinue
          npm run tauri:build -- ${{ matrix.build_args }}

      - name: Build macOS and Linux installer packages
        if: runner.os != 'Windows'
        run: npm run tauri -- build ${{ matrix.build_args }}

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Verify macOS DMG integrity
        if: runner.os == 'macOS'
        env:
          EXPECTED_VERSION: 1.1.0
        run: bash scripts/verify_macos_dmg.sh "$(find src-tauri/target -type f -path '*/release/bundle/dmg/*.dmg' -print -quit)"

      - name: Verify Windows NSIS installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -File)
          if ($installers.Count -ne 1) { throw "Expected exactly one NSIS installer, found $($installers.Count)" }
          $installer = $installers[0]
          if ($installer.Name -ne "VisualTeX_1.1.0_x64-setup.exe" -or $installer.Length -lt 1MB) {
            throw "NSIS installer has an unexpected name or size: $($installer.Name)"
          }
          & 7z t $installer.FullName
          if ($LASTEXITCODE -ne 0) { throw "NSIS installer archive verification failed" }

      - name: Verify Linux packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          deb="$(find src-tauri/target/release/bundle/deb -type f -name '*.deb' -print -quit)"
          appimage="$(find src-tauri/target/release/bundle/appimage -type f -name '*.AppImage' -print -quit)"
          test -s "$deb" && dpkg-deb --info "$deb" >/dev/null && dpkg-deb --contents "$deb" >/dev/null
          test -s "$appimage" && file "$appimage" | grep -q 'ELF'

      - name: Upload installer packages
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 30
