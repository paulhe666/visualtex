name: Windows Office acceptance

on:
  workflow_dispatch:
    inputs:
      formula_count:
        description: "Number of formulas inserted in each Office host"
        required: false
        default: "20"
      test_mode_switch:
        description: "Also install/switch OLE and VSTO modes on the disposable runner"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  windows-office-acceptance:
    # This runner must be an isolated current-user desktop session with licensed
    # Microsoft Word and PowerPoint installed. GitHub-hosted runners do not have Office.
    runs-on: [self-hosted, Windows, X64, visualtex-office]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and test Windows Office packages
        shell: pwsh
        run: ./scripts/build_windows_office.ps1

      - name: Build Windows Office.js ribbon
        run: npm run build:office:windows-ole

      - name: Run browser navigation and Session lifecycle regressions
        shell: pwsh
        run: |
          npm run build:desktop
          npm run test:editor:run
          npm run test:office-bridge

      - name: Run real Word and PowerPoint acceptance
        shell: pwsh
        run: |
          $arguments = @(
            "-FormulaCount", "${{ inputs.formula_count }}",
            "-SidecarPath", "src-tauri\binaries\visualtex-windows-office-bridge-x86_64-pc-windows-msvc.exe"
          )
          if ("${{ inputs.test_mode_switch }}" -eq "true") {
            $msi = Get-ChildItem "src-windows\VisualTeX.WindowsOffice.Installer\bin" -Filter "*.msi" -Recurse |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1 -ExpandProperty FullName
            $arguments += @("-TestModeSwitch", "-VstoMsiPath", $msi)
          }
          & ./scripts/run_windows_office_acceptance.ps1 @arguments

      - name: Upload acceptance logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-office-acceptance-logs
          path: |
            ${{ env.LOCALAPPDATA }}\VisualTeX\office\acceptance-logs\**
            src-windows\**\TestResults\**
          if-no-files-found: warn
          retention-days: 14
